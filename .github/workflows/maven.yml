# This workflow builds a Java 24 project with Maven, executes a parallel TestNG cross-browser suite,
# captures failure screenshots from the correct path, and generates a visual test report tab.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your code from GitHub
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up modern Java 24 runtime environment
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Optional: Cache your Maven dependencies to speed up subsequent runs
    - name: Cache Maven Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: S({ runner.os ))-maven-${{ hashFiles(' ** /pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven

    # Step 4 - Run tests
    - name: Run TestNG tests
      run: mvn clean test
      
      # Step 5 - Upload Extent Report as artifact
    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Test-Report
        path: report/