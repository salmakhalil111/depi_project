name: Java 24 Selenium CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 24
      uses: actions/setup-java@v4
      with:
        java-version: '24'
        distribution: 'temurin'
        cache: maven
        
    # Executes your specific TestNG cross-browser suite configuration
    - name: Run Parallel TestNG Suite
      run: mvn -B test -DsuiteXmlFile=testng.xml

    - name: Upload Error Screenshots on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: selenium-failure-screenshots
        path: target/screenshots/*.png
