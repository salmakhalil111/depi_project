# Highly stable command-line testing workflow with a fallback copy step.
# Updated to leverage Continuous Delivery (CD) to Netlify for contributors.
name: Java 17 Selenium CI/CD with Allure Dashboard (Netlify)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Establish uniform Java 17 environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cache dependencies to speed up the pipeline
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Drive execution via TestNG XML
      - name: Run TestNG tests
        run: mvn clean test -DsuiteXmlFile=testng.xml
        continue-on-error: true

      # 5. Standalone Allure CLI Engine Setup
      - name: Install Allure CLI Engine
        if: always()
        run: |
          curl -o allure-commandline.tgz -L https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure-commandline.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # 6. Unified Data Collection & Generation Step (Zero-Risk Script)
      - name: Collect Results and Generate Allure HTML Dashboard
        if: always()
        run: |
          echo "Creating a single secure directory for Allure data..."
          mkdir -p unified-results
          
          # Check the root folder location
          if [ -d "allure-results" ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "Found test data in root allure-results/. Copying..."
            cp -r allure-results/* unified-results/
          fi
          
          # Check the target folder location
          if [ -d "target/allure-results" ] && [ "$(ls -A target/allure-results 2>/dev/null)" ]; then
            echo "Found test data in target/allure-results/. Copying..."
            cp -r target/allure-results/* unified-results/
          fi
          
          echo "Compiling final single-page HTML report application..."
          allure generate unified-results --clean -o allure-report

      # 7. Package the compiled dashboard folder as a downloadable artifact
      - name: Upload Finished Allure Report Website
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complete-allure-html-dashboard
          path: allure-report/
          retention-days: 14

      # 8. Keep failure screenshots accessible under your build artifacts
      - name: Upload Error Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-failure-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore

      # ==========================================
      # CD PHASE: Deploying the Test Insights Live
      # ==========================================

      # 9. Deploy the allure-report folder directly to Netlify
      - name: Deploy Test Dashboard to Netlify
        if: always() # Ensures live updates happen even if selenium tests find bugs
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './allure-report'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.AUTH_SECRET_TOKEN }}