name: Java 17 Selenium CI with Allure Artifact

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Establish uniform Java 17 environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cache dependencies to speed up the pipeline
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Drive execution via TestNG XML
      # continue-on-error guarantees that even with automationexercise failures, the workflow keeps going!
      - name: Run TestNG suites
        run: mvn clean test -DsuiteXmlFile=testng.xml
        continue-on-error: true

      # 5. Use the official marketplace action to automatically hunt down, clean, and compile the report
      - name: Generate Allure Static HTML Report Dashboard
        uses: simple-elf/allure-report-action@v1.9
        if: always()
        id: allure-report
        with:
          allure_results: target/allure-results
          allure_report: allure-report

      # 6. Package the compiled dashboard folder as a downloadable artifact
      - name: Upload Finished Allure Report Website
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complete-allure-html-dashboard
          path: allure-report/
          retention-days: 14

      # 7. Keep failure screenshots accessible under your build artifacts
      - name: Upload Error Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-failure-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore