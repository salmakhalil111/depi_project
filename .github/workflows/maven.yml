# This workflow builds a Java 24 project with Maven, executes a parallel TestNG cross-browser suite,
# captures failure screenshots from the correct path, and generates a visual test report tab.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your code from GitHub
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up modern Java 24 runtime environment
    - name: Set up JDK 24
      uses: actions/setup-java@v4
      with:
        java-version: '24'
        distribution: 'temurin'
        cache: maven # Caches dependencies to speed up future runs

    # 3. Execute your TestNG suite (Runs Chrome & Edge simultaneously)
    - name: Run Parallel TestNG Suite
#       continue-on-error: true # Optional: Uncomment if you don't want a failing test to block the dependency graph step below
      run: mvn -B test -DsuiteXmlFile=testng.xml

    # 4. In Sync with ScreenShotUtils.java: Upload screenshots only if a test fails
    - name: Upload Error Screenshots on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: selenium-failure-screenshots
        path: screenshots/*.png
        if-no-files-found: ignore # Prevents annoying runner warnings if all tests pass cleanly

    # 5. Generate the interactive "Tests" UI tab inside GitHub Actions
    - name: Publish Visual Test Report
      uses: mikepenz/action-junit-report@v4
      if: always() # ALWAYS run this step so you can see your successes too!
      with:
        report_paths: '**/target/surefire-reports/junitreports/TEST-*.xml'

    # 6. Keep your optional dependency security tracking active
    - name: Update dependency graph
      if: success()
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
