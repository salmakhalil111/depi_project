# Optimized workflow for repository contributors to run TestNG and compile a local Allure Report dashboard artifact.

name: Java 17 Selenium CI with Allure Artifact

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Establish uniform Java 17 environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cache dependencies to speed up the build pipeline
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Drive execution via TestNG XML
      # 'continue-on-error: true' guarantees that regardless of e-commerce test site instabilities, the dashboard still compiles!
      - name: Run TestNG suites
        run: mvn clean test -DsuiteXmlFile=testng.xml
        continue-on-error: true

      # 5. Download the standalone Allure Command Line tool into the runner
      - name: Install Allure CLI Engine
        run: |
          curl -o allure-commandline.tgz -L https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure-commandline.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # 6. Compile the raw 'allure-results' JSON data into a standalone HTML website
      - name: Generate Allure Static HTML Report Dashboard
        if: always()
        run: |
          allure generate allure-results target/allure-results --clean -o allure-report

      # 7. Package the compiled dashboard folder as a downloadable artifact
      - name: Upload Finished Allure Report Website
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complete-allure-html-dashboard
          path: allure-report/
          retention-days: 14

      # 8. Keep failure screenshots easily accessible under your build artifacts
      - name: Upload Error Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-failure-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore